<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ミリプロ風クリッカー - Aim for a Million!</title>
    <link rel="icon" href="../images/icon/favicon.ico" sizes="any">
    <link rel="icon" href="../images/icon/192.png" sizes="192x192" type="image/png">
    <link rel="apple-touch-icon" href="../images/icon/192.png" sizes="192x192">
    <link rel="apple-touch-icon" href="../images/icon/518.png" sizes="518x518">
    <style>
        :root {
            --primary-color: #ff8fb6;
            --secondary-color: #8be0ff;
            --dark-bg: #222;
            --border-color: #ccc;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            touch-action: manipulation;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background: linear-gradient(135deg, #ffeef4, #eef9ff);
            color: #333;
            overflow: hidden;
        }

        /* 2カラムレイアウト（PC向け） */
        #left-panel {
            flex: 4;
            background: linear-gradient(to bottom, rgba(255,143,182,0.1), rgba(139,224,255,0.1));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-shadow: inset -5px 0 10px rgba(0,0,0,0.05);
            position: relative;
        }

        #right-panel {
            flex: 6;
            max-width: 600px;
            background-color: #fff;
            border-left: 2px solid var(--secondary-color);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* スマホ向けレイアウト（画面幅が768px以下の場合） */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
                min-height: 100dvh;
                height: auto;
            }
            #left-panel {
                flex: 0 0 auto;
                height: auto;
                border-right: none;
                border-bottom: 2px solid var(--primary-color);
                padding: 10px;
                justify-content: center;
            }
            #right-panel {
                flex: 0 0 auto;
                max-width: 100%;
                height: auto;
                border-left: none;
                display: flex;
                flex-direction: column;
            }
            .upgrades-container {
                display: none;
            }
            .shop-header {
                display: none;
            }
            .stats-box {
                margin-top: 30px;
                margin-bottom: 10px;
                padding: 10px;
            }
            .views-count {
                font-size: 1.6rem;
            }
            .main-button {
                width: 150px;
                height: 150px;
                font-size: 1.3rem;
            }
            .agency-name {
                font-size: 1rem;
                top: 10px;
                padding: 3px 15px;
            }
            #mobile-upgrade-btn {
                display: block;
            }
            #upgrade-modal {
                display: none;
            }
            #upgrade-modal.active {
                display: flex;
            }
            .goal-container {
                padding: 10px 15px;
            }
            .goal-title {
                font-size: 0.9rem;
                margin-bottom: 5px;
            }
            .progress-bar-bg {
                height: 18px;
            }
        }

        /* 左パネル：メインクリックエリア */
        .agency-name {
            position: absolute;
            top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #555;
            background: rgba(255,255,255,0.8);
            padding: 5px 20px;
            border-radius: 20px;
        }

        .stats-box {
            text-align: center;
            width: 90%;
            max-width: 350px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            margin-top: 50px;
        }

        .views-count {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--primary-color);
            margin: 5px 0;
            word-break: break-all;
        }

        .vps-count, .click-power {
            font-size: 1rem;
            color: #666;
            margin: 2px 0;
        }

        .main-button {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, var(--primary-color) 0%, #ff6b9d 100%);
            border-radius: 50%;
            border: 8px solid rgba(255, 255, 255, 0.5);
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 143, 182, 0.5);
            transition: transform 0.05s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            position: relative;
            -webkit-tap-highlight-color: transparent; /* スマホタップ時の青枠を消す */
        }

        .main-button:active {
            transform: scale(0.95);
        }

        .click-particle {
            position: absolute;
            font-weight: bold;
            color: var(--primary-color);
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            font-size: 1.5rem;
            text-shadow: 1px 1px 2px white;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
        }

        /* 右パネル：目標と進行状況（上部） */
        .goal-container {
            width: 100%;
            background: var(--dark-bg);
            padding: 15px 20px;
            text-align: center;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .goal-title {
            font-size: 1.1rem;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .progress-bar-bg {
            width: 100%;
            height: 25px;
            background: #444;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #666;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--secondary-color), var(--primary-color));
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.9rem;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px black;
        }

        /* 右パネル：アップグレードエリア（下部） */
        .shop-header {
            text-align: center;
            padding: 10px;
            background: #eee;
            color: #333;
            font-size: 1rem;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
        }

        .upgrades-container {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            margin: 0;
            background: #f9f9f9;
        }

        .upgrade-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 15px;
            background-color: white;
            border: none;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background-color 0.1s;
            text-align: left;
        }

        .upgrade-btn:hover:not(:disabled) {
            background-color: #f0f8ff;
        }

        .upgrade-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background-color: #f5f5f5;
        }

        .upgrade-icon {
            font-size: 2rem;
            margin-right: 15px;
            width: 45px;
            text-align: center;
        }

        .upgrade-info {
            flex: 1;
        }

        .upgrade-info h3 {
            margin: 0 0 5px 0;
            font-size: 1.1rem;
            color: #333;
        }

        .upgrade-cost {
            font-weight: bold;
            color: var(--primary-color);
            font-size: 0.95rem;
        }

        .upgrade-desc {
            font-size: 0.8rem;
            color: #666;
            margin-top: 3px;
        }

        .upgrade-count {
            font-size: 1.8rem;
            font-weight: bold;
            color: rgba(0,0,0,0.08);
            min-width: 40px;
            text-align: right;
        }

        /* クリア画面 */
        #clear-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .clear-title {
            font-size: 3rem;
            color: var(--primary-color);
            text-shadow: 2px 2px 0 #fff;
            margin-bottom: 20px;
            animation: bounce 1s infinite alternate;
        }
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-20px); }
        }
        .clear-btn {
            margin-top: 30px;
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 30px;
            background: var(--secondary-color);
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        /* スマホ用アップグレードボタン（PCでは非表示） */
        #mobile-upgrade-btn {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary-color);
            color: white;
            border: 4px solid rgba(255,255,255,0.5);
            font-size: 1.5rem;
            box-shadow: 0 4px 15px rgba(255,143,182,0.5);
            cursor: pointer;
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        #mobile-upgrade-btn:active {
            transform: scale(0.92);
        }

        /* スマホ用アップグレードモーダル */
        #upgrade-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.6);
            z-index: 200;
            align-items: flex-end;
            justify-content: center;
        }
        #upgrade-modal .modal-content {
            background: #fff;
            width: 100%;
            max-height: 80vh;
            border-radius: 20px 20px 0 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: slideUp 0.25s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        #upgrade-modal .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #eee;
            border-bottom: 1px solid #ddd;
            font-weight: bold;
            font-size: 1rem;
        }
        #upgrade-modal .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
            padding: 0 5px;
        }
        #upgrade-modal .modal-body {
            flex: 1;
            overflow-y: auto;
        }

    </style>
</head>
<body>

    <div id="left-panel">
        <div class="agency-name">Million Production</div>
        <div class="stats-box">
            <div class="views-count"><span id="views">0</span> 再生</div>
            <div class="vps-count">自動再生: <span id="vps">0</span> /秒</div>
            <div class="click-power">クリック力: <span id="click-power-display">1</span> /タップ</div>
        </div>
        
        <button id="main-btn" class="main-button">
            ▶️<br>投稿
        </button>
    </div>

    <div id="right-panel">
        <div class="goal-container">
            <div class="goal-title">目標：ミリオン（100万再生）達成！</div>
            <div class="progress-bar-bg">
                <div id="progress-fill" class="progress-bar-fill"></div>
                <div id="progress-text" class="progress-text">0.00%</div>
            </div>
        </div>

        <div class="shop-header">アップグレード一覧</div>
        <div class="upgrades-container" id="upgrades-container"></div>
    </div>

    <!-- スマホ用アップグレードボタン -->
    <button id="mobile-upgrade-btn">🛠️</button>

    <!-- スマホ用アップグレードモーダル -->
    <div id="upgrade-modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>アップグレード一覧</span>
                <button class="modal-close" id="modal-close-btn">✕</button>
            </div>
            <div class="modal-body" id="modal-upgrades-container"></div>
        </div>
    </div>

    <div id="clear-modal">
        <div class="clear-title">🎊 100万再生達成！ 🎊</div>
        <h2>Million Production 大成功！</h2>
        <p>あなたは立派なプロデューサーです。</p>
        <button class="clear-btn" onclick="continueGame()">さらに上を目指す</button>
    </div>

    <script>
        let views = 0;
        let vps = 0; 
        let clickPower = 1; 
        let isCleared = false; 
        const GOAL_VIEWS = 1000000; 

        // アップグレードの細分化とバリエーション追加
        const upgrades = [
            // レベルの細かいマウス強化（クリック系）
            { id: 0, name: "マウス強化 Lv.1", icon: "🖱️", baseCost: 15, type: 'click', value: 1, count: 0, desc: "クリック力 +1" },
            { id: 1, name: "SNSアカウント開設", icon: "📱", baseCost: 50, type: 'auto', value: 1, count: 0, desc: "自動再生 +1/秒" },
            { id: 2, name: "マウス強化 Lv.2", icon: "🖱️", baseCost: 150, type: 'click', value: 3, count: 0, desc: "クリック力 +3" },
            { id: 3, name: "ショート動画投稿", icon: "⏱️", baseCost: 300, type: 'auto', value: 5, count: 0, desc: "自動再生 +5/秒" },
            { id: 4, name: "マウス強化 Lv.3", icon: "🖱️", baseCost: 800, type: 'click', value: 10, count: 0, desc: "クリック力 +10" },
            { id: 5, name: "サムネ研究", icon: "🖼️", baseCost: 2000, type: 'click', value: 20, count: 0, desc: "クリック力 +20" },
            { id: 6, name: "専属エディター", icon: "🎬", baseCost: 3500, type: 'auto', value: 25, count: 0, desc: "自動再生 +25/秒" },
            { id: 7, name: "マウス強化 Lv.4", icon: "🖱️", baseCost: 6000, type: 'click', value: 50, count: 0, desc: "クリック力 +50" },
            { id: 8, name: "歌ってみた動画", icon: "🎤", baseCost: 12000, type: 'auto', value: 80, count: 0, desc: "自動再生 +80/秒" },
            { id: 9, name: "ゲーミングPC導入", icon: "💻", baseCost: 25000, type: 'click', value: 150, count: 0, desc: "クリック力 +150" },
            { id: 10, name: "ゲーム実況配信", icon: "🎮", baseCost: 45000, type: 'auto', value: 200, count: 0, desc: "自動再生 +200/秒" },
            { id: 11, name: "バズり企画実行", icon: "✨", baseCost: 80000, type: 'click', value: 400, count: 0, desc: "クリック力 +400" },
            { id: 12, name: "プロモーション広告", icon: "📢", baseCost: 150000, type: 'auto', value: 600, count: 0, desc: "自動再生 +600/秒" },
            { id: 13, name: "大物YouTuberコラボ", icon: "🤝", baseCost: 300000, type: 'click', value: 1000, count: 0, desc: "クリック力 +1000" },
            { id: 14, name: "オリジナル楽曲リリース", icon: "🎵", baseCost: 600000, type: 'auto', value: 2500, count: 0, desc: "自動再生 +2500/秒" },
            { id: 15, name: "3Dライブ開催！", icon: "🌟", baseCost: 1200000, type: 'auto', value: 5000, count: 0, desc: "自動再生 +5000/秒" }
        ];

        const viewsDisplay = document.getElementById("views");
        const vpsDisplay = document.getElementById("vps");
        const clickPowerDisplay = document.getElementById("click-power-display");
        const progressFill = document.getElementById("progress-fill");
        const progressText = document.getElementById("progress-text");
        const mainBtn = document.getElementById("main-btn");
        const upgradesContainer = document.getElementById("upgrades-container");
        const clearModal = document.getElementById("clear-modal");

        // スマホでのタッチイベントでも反応を良くするための処理
        mainBtn.addEventListener("pointerdown", (e) => {
            views += clickPower;
            createClickParticle(e);
            updateUI();
            checkGoal();
        });

        function createClickParticle(e) {
            const particle = document.createElement('div');
            particle.className = 'click-particle';
            particle.innerText = `+${clickPower}`;
            
            const rect = mainBtn.getBoundingClientRect();
            // ポインターの座標からボタン内の相対位置を計算
            const x = e.clientX - rect.left - 20 + (Math.random() * 40 - 20); 
            const y = e.clientY - rect.top - 20;

            particle.style.left = `${x}px`;
            particle.style.top = `${y}px`;
            mainBtn.appendChild(particle);

            setTimeout(() => {
                particle.remove();
            }, 1000);
        }

        // コスト計算（買うたびに1.15倍になる）
        function getUpgradeCost(index) {
            const u = upgrades[index];
            return Math.floor(u.baseCost * Math.pow(1.15, u.count));
        }

        function buyUpgrade(index) {
            const cost = getUpgradeCost(index);
            if (views >= cost) {
                views -= cost;
                upgrades[index].count += 1;
                recalculateStats();
                renderUpgrades();
                updateUI();
            }
        }

        // ステータス再計算
        function recalculateStats() {
            let newVps = 0;
            let newClickPower = 1; // 初期クリック力は1

            upgrades.forEach(u => {
                if (u.type === 'click') {
                    newClickPower += u.value * u.count;
                } else if (u.type === 'auto') {
                    newVps += u.value * u.count;
                }
            });

            vps = newVps;
            clickPower = newClickPower;
        }

        function updateUI() {
            viewsDisplay.innerText = Math.floor(views).toLocaleString();
            vpsDisplay.innerText = vps.toFixed(1);
            clickPowerDisplay.innerText = clickPower.toLocaleString();

            let progress = (views / GOAL_VIEWS) * 100;
            if (progress > 100) progress = 100;
            progressFill.style.width = `${progress}%`;
            progressText.innerText = `${progress.toFixed(2)}%`;

            // 購入可能なボタンの判定（各レンダリング関数内でも処理）
            document.querySelectorAll('#upgrades-container .upgrade-btn').forEach((btn, index) => {
                const cost = getUpgradeCost(index);
                btn.disabled = views < cost;
            });
        }

        // アップグレードリストの描画
        function renderUpgrades() {
            upgradesContainer.innerHTML = '';
            upgrades.forEach((u, index) => {
                const cost = getUpgradeCost(index);
                const btn = document.createElement('button');
                btn.className = 'upgrade-btn';
                btn.onclick = () => buyUpgrade(index);

                btn.innerHTML = `
                    <div class="upgrade-icon">${u.icon}</div>
                    <div class="upgrade-info">
                        <h3>${u.name}</h3>
                        <div class="upgrade-cost">${cost.toLocaleString()} 再生</div>
                        <div class="upgrade-desc">${u.desc}</div>
                    </div>
                    <div class="upgrade-count">${u.count}</div>
                `;
                upgradesContainer.appendChild(btn);
            });
        }

        function checkGoal() {
            if (views >= GOAL_VIEWS && !isCleared) {
                isCleared = true;
                clearModal.style.display = 'flex';
            }
        }

        function continueGame() {
            clearModal.style.display = 'none';
        }

        // 自動再生のループ
        setInterval(() => {
            if (vps > 0) {
                views += vps / 30;
                updateUI();
                checkGoal();
            }
        }, 1000 / 30);

        // スマホ用アップグレードモーダル
        const mobileBtn = document.getElementById('mobile-upgrade-btn');
        const upgradeModal = document.getElementById('upgrade-modal');
        const modalClose = document.getElementById('modal-close-btn');
        const modalBody = document.getElementById('modal-upgrades-container');

        mobileBtn.addEventListener('click', () => {
            renderModalUpgrades();
            upgradeModal.classList.add('active');
        });
        modalClose.addEventListener('click', () => {
            upgradeModal.classList.remove('active');
        });
        upgradeModal.addEventListener('click', (e) => {
            if (e.target === upgradeModal) {
                upgradeModal.classList.remove('active');
            }
        });

        function renderModalUpgrades() {
            modalBody.innerHTML = '';
            upgrades.forEach((u, index) => {
                const cost = getUpgradeCost(index);
                const btn = document.createElement('button');
                btn.className = 'upgrade-btn';
                btn.disabled = views < cost;
                btn.onclick = () => {
                    buyUpgrade(index);
                    renderModalUpgrades();
                };

                btn.innerHTML = `
                    <div class="upgrade-icon">${u.icon}</div>
                    <div class="upgrade-info">
                        <h3>${u.name}</h3>
                        <div class="upgrade-cost">${cost.toLocaleString()} 再生</div>
                        <div class="upgrade-desc">${u.desc}</div>
                    </div>
                    <div class="upgrade-count">${u.count}</div>
                `;
                modalBody.appendChild(btn);
            });
        }

        // 初期化
        renderUpgrades();
        updateUI();

    </script>
</body>
</html>
