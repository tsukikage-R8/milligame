<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Milli Games</title>
  <link rel="icon" href="images/icon/favicon.ico" sizes="any">
  <link rel="icon" href="images/icon/192.png" sizes="192x192" type="image/png">
  <link rel="apple-touch-icon" href="images/icon/192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="images/icon/518.png" sizes="518x518">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 背景アニメーション -->
  <div id="bg-blur">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- ヘッダー（固定） -->
  <header id="header" class="glass">
    <div id="header-inner">
      <div id="header-logo"><img src="images/rogo.png" alt="Milli Games"></div>
      <div id="header-actions">
        <button id="profile-btn" class="icon-btn" aria-label="プロフィール">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/>
          </svg>
        </button>
        <button id="menu-btn" class="icon-btn" aria-label="メニュー">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- メインレイアウト -->
  <div id="layout">
    <main id="main">

      <!-- ホーム画面 -->
      <div id="home-view">
        <section id="carousel-section" aria-label="ゲーム一覧">
          <div id="carousel-container">
            <div id="carousel-track" role="list"></div>
          </div>
          <button id="carousel-prev" class="carousel-arrow" aria-label="前のゲーム">&#8249;</button>
          <button id="carousel-next" class="carousel-arrow" aria-label="次のゲーム">&#8250;</button>
          <div id="carousel-indicators" role="tablist" aria-label="スライド選択"></div>
        </section>
      </div>

      <!-- 全ゲーム画面 -->
      <div id="all-games-view" style="display: none;">
        <div id="all-games-filters" class="filter-tabs">
          <button class="filter-tab active" data-filter="すべて">すべて</button>
          <button class="filter-tab" data-filter="おすすめ">おすすめ</button>
          <button class="filter-tab" data-filter="新着">新着</button>
        </div>
        <div id="all-games-list" class="game-table"></div>
      </div>

    </main>

    <!-- サイドパネル -->
    <aside id="side-panel">
      <section class="panel-section" id="news-panel">
        <h2 class="panel-title">お知らせ</h2>
        <div class="panel-content"></div>
      </section>
      <section class="panel-section" id="recent-panel">
        <h2 class="panel-title">最近追加されたゲーム</h2>
        <div class="panel-content"></div>
      </section>
    </aside>
  </div>

  <!-- 全てのゲームボタン -->
  <button id="all-games-btn" class="fab" aria-label="全てのゲーム">全てのゲーム ▾</button>

  <!-- 汎用ポップアップモーダル -->
  <div id="popup-overlay" class="modal-overlay">
    <div id="popup-modal" class="modal">
      <div class="modal-header">
        <h2 id="popup-title"></h2>
        <button class="modal-close" id="popup-close" aria-label="閉じる">&times;</button>
      </div>
      <div id="popup-body"></div>
    </div>
  </div>

  <!-- メニューオーバーレイ -->
  <div id="menu-overlay"></div>

  <!-- サイドメニュー -->
  <nav id="side-menu" class="glass" aria-label="メインメニュー">
    <div id="side-menu-header">
      <h2>メニュー</h2>
      <button id="close-menu" class="icon-btn" aria-label="メニューを閉じる">&times;</button>
    </div>
    <div id="side-menu-body">
      <section class="menu-section menu-info-section">
        <h3>情報</h3>
        <button class="menu-popup-btn" data-section="news">お知らせ</button>
        <button class="menu-popup-btn" data-section="recent">ゲーム一覧</button>
      </section>
      <section class="menu-section">
        <h3>設定</h3>
        <div class="setting-item">
          <label for="volume-slider">効果音 音量</label>
          <div class="volume-control">
            <input type="range" id="volume-slider" min="0" max="100" step="20" value="80">
            <span id="volume-label">80%</span>
          </div>
        </div>
      </section>
      <section class="menu-section menu-install-section">
        <button id="menu-install-btn" class="menu-install-btn">アプリとしてインストール</button>
      </section>
    </div>
  </nav>

  <!-- UA通知オーバーレイ -->
  <div id="ua-overlay" class="ua-overlay ua-hidden">
    <div class="ua-card">
      <div class="ua-header">
        <span id="ua-title" class="ua-title"></span>
        <button id="ua-close" class="ua-close">&times;</button>
      </div>
      <div id="ua-body" class="ua-body"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
